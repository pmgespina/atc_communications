name: atc_env
channels:
  - conda-forge
  - defaults
dependencies:
  # Python base
  - python=3.10
  
  # Core numeric & data
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - joblib
  
  # Audio processing (via pip for ARM64 compatibility)
  # librosa, soundfile, audioread installed via pip
  
  # Visualization
  - matplotlib
  - seaborn
  
  # Jupyter & IPython
  - ipython
  - ipykernel
  - jupyter
  - jupyter_client
  - jupyter_core
  
  # Utilities
  - tqdm
  - pyyaml
  - requests
  - ffmpeg
  - pip
  
  - pip:
      # Audio processing (macOS ARM64 compatible)
      - librosa>=0.10.0
      - soundfile>=0.12.0
      - audioread>=3.0.0
      
      # PyTorch for macOS/ARM64 (installed via pip for proper M1/M2 support)
      - torch==2.10.*
      - torchaudio==2.10.*
      - torchvision==0.25.*
      - torchcodec==0.10.*
      
      # NLP & Transformers (core for audio/text ML)
      - transformers==5.3.0
      - datasets==4.8.4
      - tokenizers==0.22.2
      - jiwer==4.0.0
      
      # NLP classic (required for Notebook 4)
      - gensim==4.3.2
      - wordcloud==1.9.3
      
      # Transfer learning optimization (optional but recommended)
      - accelerate==0.28.0
      
      # Hugging Face utilities
      - huggingface-hub==1.7.2
      - safetensors==0.7.0
      
      # Additional data/evaluation
      - pyarrow==23.0.1
      - rapidfuzz==3.14.3
      - networkx==3.4.2
      
      # Utilities
      - pooch==1.9.0
      - fsspec>=2024.1.0

variables:
  KMP_DUPLICATE_LIB_OK: "TRUE"
